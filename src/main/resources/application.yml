spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zenflow}
    username: ${DB_USER:zenflow}
    password: ${DB_PASS:zenflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
zenflow:
  jwt:
    secret: ${JWT_SECRET:a-very-long-and-secure-secret-key-for-jwt-signing}
    access-expiry-minutes: 15
    refresh-expiry-days: 7
  google:
    client-id: ${GOOGLE_CLIENT_ID:dummy-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:dummy-secret}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
