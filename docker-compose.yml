services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zenflow
      POSTGRES_USER: zenflow
      POSTGRES_PASSWORD: zenflow
    ports:
      - "5432:5432"
    volumes:
      - zenflow-pgdata:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@zenflow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  zenflow-pgdata:
